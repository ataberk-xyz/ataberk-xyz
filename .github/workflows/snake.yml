name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"   # twice a day
  workflow_dispatch:          # manual run button
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%231ABC9C&color_dots=%230D1117,%23115E52,%231ABC9C,%232CE5C0,%235BF5DE
            dist/github-contribution-grid-snake.svg?color_snake=%231ABC9C&color_dots=%23EBEDF0,%239BE9D8,%2340C9A2,%231ABC9C,%23115E52

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
